<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neo Market — Premium Car Accessories</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* =================== CONFIG COLORS =================== */
:root {
  --brand: #E8340A;
  --brand-dark: #B5260A;
  --brand-light: #FF5533;
  --bg: #0A0A0C;
  --bg2: #111116;
  --bg3: #18181F;
  --surface: #1E1E28;
  --border: #2A2A38;
  --text: #F0F0F5;
  --text2: #9090A8;
  --text3: #5A5A70;
  --gold: #F5B800;
  --green: #22C55E;
  --font-display: 'Bebas Neue', sans-serif;
  --font-heading: 'Rajdhani', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --radius: 8px;
  --radius-lg: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
  --shadow-lg: 0 12px 48px rgba(0,0,0,0.7);
  --transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
}

/* =================== RESET =================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 15px;
  line-height: 1.6;
}
a { color: inherit; text-decoration: none; }
button { font-family: var(--font-body); cursor: pointer; border: none; }
img { max-width: 100%; display: block; }
input, textarea, select { font-family: var(--font-body); }

/* =================== SCROLLBAR =================== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--brand); border-radius: 3px; }

/* =================== NAVBAR =================== */
#navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  background: rgba(10,10,12,0.9);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  height: 64px;
  display: flex;
  align-items: center;
}
.nav-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 24px;
  width: 100%;
  display: flex;
  align-items: center;
  gap: 24px;
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  flex-shrink: 0;
}
.nav-logo-icon {
  width: 36px;
  height: 36px;
  background: var(--brand);
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 16px;
  color: white;
}
.nav-logo-text {
  font-family: var(--font-display);
  font-size: 26px;
  letter-spacing: 2px;
  color: var(--text);
}
.nav-logo-text span { color: var(--brand); }
.nav-search {
  flex: 1;
  max-width: 440px;
  position: relative;
}
.nav-search input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 30px;
  padding: 9px 18px 9px 42px;
  color: var(--text);
  font-size: 14px;
  transition: var(--transition);
  outline: none;
}
.nav-search input:focus { border-color: var(--brand); background: var(--surface); }
.nav-search input::placeholder { color: var(--text3); }
.nav-search-icon {
  position: absolute;
  left: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 14px;
}
.nav-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.nav-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-radius: var(--radius);
  background: transparent;
  color: var(--text2);
  font-family: var(--font-heading);
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.5px;
  transition: var(--transition);
  cursor: pointer;
}
.nav-btn:hover { color: var(--text); background: var(--surface); }
.nav-btn.active { color: var(--brand); }
.cart-btn {
  background: var(--brand);
  color: white;
  border-radius: var(--radius);
  padding: 8px 18px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.5px;
  transition: var(--transition);
  cursor: pointer;
  position: relative;
}
.cart-btn:hover { background: var(--brand-light); transform: translateY(-1px); }
.cart-count {
  background: white;
  color: var(--brand);
  border-radius: 50%;
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  min-width: 20px;
}
.cart-count.hidden { display: none; }

/* =================== PAGES =================== */
.page { display: none; padding-top: 64px; min-height: 100vh; }
.page.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* =================== HERO =================== */
.hero {
  position: relative;
  min-height: 520px;
  display: flex;
  align-items: center;
  overflow: hidden;
  background: linear-gradient(135deg, #0A0A0C 0%, #16090A 50%, #0A0A0C 100%);
}
.hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 80% at 70% 50%, rgba(232,52,10,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 10% 80%, rgba(232,52,10,0.06) 0%, transparent 50%);
}
.hero-grid-lines {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(232,52,10,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(232,52,10,0.06) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 100% at 50% 50%, black 0%, transparent 100%);
}
.hero-content {
  max-width: 1400px;
  margin: 0 auto;
  padding: 80px 24px;
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}
.hero-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(232,52,10,0.15);
  border: 1px solid rgba(232,52,10,0.3);
  border-radius: 30px;
  padding: 5px 14px;
  font-family: var(--font-heading);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--brand-light);
  text-transform: uppercase;
  margin-bottom: 20px;
}
.hero-tag::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--brand-light); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.hero-title {
  font-family: var(--font-display);
  font-size: clamp(52px, 6vw, 88px);
  line-height: 0.95;
  letter-spacing: 2px;
  margin-bottom: 20px;
}
.hero-title .accent { color: var(--brand); display: block; }
.hero-desc {
  color: var(--text2);
  font-size: 16px;
  max-width: 400px;
  margin-bottom: 36px;
  line-height: 1.7;
}
.hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }
.btn-primary {
  background: var(--brand);
  color: white;
  padding: 13px 28px;
  border-radius: var(--radius);
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: var(--transition);
  cursor: pointer;
  border: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn-primary:hover { background: var(--brand-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,52,10,0.4); }
.btn-outline {
  background: transparent;
  color: var(--text);
  padding: 13px 28px;
  border-radius: var(--radius);
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: var(--transition);
  cursor: pointer;
  border: 1px solid var(--border);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn-outline:hover { border-color: var(--brand); color: var(--brand); transform: translateY(-2px); }
.hero-stats {
  display: flex;
  gap: 32px;
  margin-top: 48px;
}
.hero-stat { }
.hero-stat-num {
  font-family: var(--font-display);
  font-size: 36px;
  color: var(--brand);
  line-height: 1;
}
.hero-stat-label {
  font-size: 12px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 4px;
}
.hero-visual {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.hero-ring {
  width: 320px;
  height: 320px;
  border-radius: 50%;
  border: 1px solid rgba(232,52,10,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  animation: spin 20s linear infinite;
}
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.hero-ring::before {
  content: '';
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--brand);
  top: -4px;
  left: 50%;
  transform: translateX(-50%);
  box-shadow: 0 0 12px var(--brand);
}
.hero-ring-inner {
  width: 240px;
  height: 240px;
  border-radius: 50%;
  border: 1px solid rgba(232,52,10,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: spin 15s linear infinite reverse;
}
.hero-center-icon {
  font-size: 80px;
  animation: spin 20s linear infinite;
}

/* =================== SECTION =================== */
.section {
  max-width: 1400px;
  margin: 0 auto;
  padding: 60px 24px;
}
.section-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 36px;
  gap: 16px;
  flex-wrap: wrap;
}
.section-title {
  font-family: var(--font-display);
  font-size: clamp(32px, 4vw, 52px);
  letter-spacing: 1px;
  line-height: 1;
}
.section-title span { color: var(--brand); }
.section-subtitle { color: var(--text2); font-size: 14px; margin-top: 6px; }
.see-all {
  font-family: var(--font-heading);
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 1px;
  color: var(--brand);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: var(--transition);
  cursor: pointer;
  white-space: nowrap;
  background: none;
  border: none;
}
.see-all:hover { color: var(--brand-light); gap: 10px; }

/* =================== FILTER BAR =================== */
.filter-bar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 36px;
}
.filter-chip {
  padding: 7px 18px;
  border-radius: 30px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-family: var(--font-heading);
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: var(--transition);
}
.filter-chip:hover { border-color: var(--brand); color: var(--brand); }
.filter-chip.active { background: var(--brand); border-color: var(--brand); color: white; }

/* =================== PRODUCT GRID =================== */
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}
.product-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: var(--transition);
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
}
.product-card:hover {
  border-color: rgba(232,52,10,0.4);
  transform: translateY(-4px);
  box-shadow: var(--shadow);
}
.product-card-img {
  aspect-ratio: 4/3;
  overflow: hidden;
  background: var(--surface);
  position: relative;
}
.product-card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}
.product-card:hover .product-card-img img { transform: scale(1.06); }
.product-card-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: var(--brand);
  color: white;
  font-family: var(--font-heading);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 4px;
}
.product-card-stock-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  border: 1px solid var(--border);
  color: var(--text2);
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
}
.product-card-stock-badge.low { color: #F59E0B; border-color: rgba(245,158,11,0.3); }
.product-card-body {
  padding: 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.product-card-category {
  font-size: 11px;
  color: var(--brand);
  font-family: var(--font-heading);
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.product-card-name {
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 17px;
  line-height: 1.3;
  color: var(--text);
}
.product-card-desc {
  font-size: 13px;
  color: var(--text3);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: auto;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.product-price {
  font-family: var(--font-heading);
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}
.product-price .currency { color: var(--text2); font-size: 14px; margin-right: 1px; }
.add-cart-btn {
  background: var(--brand);
  color: white;
  border: none;
  border-radius: var(--radius);
  padding: 8px 14px;
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.add-cart-btn:hover { background: var(--brand-light); }
.add-cart-btn.in-cart {
  background: var(--green);
  cursor: default;
}
.add-cart-btn.in-cart:hover { background: var(--green); transform: none; }

/* =================== CATEGORIES STRIP =================== */
.categories-strip {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 14px;
  margin-bottom: 50px;
}
.cat-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 16px;
  text-align: center;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.cat-card:hover { border-color: var(--brand); transform: translateY(-3px); }
.cat-card.active { border-color: var(--brand); background: rgba(232,52,10,0.08); }
.cat-icon { font-size: 28px; }
.cat-name {
  font-family: var(--font-heading);
  font-weight: 600;
  font-size: 13px;
  color: var(--text2);
}
.cat-card.active .cat-name, .cat-card:hover .cat-name { color: var(--brand); }
.cat-count {
  font-size: 11px;
  color: var(--text3);
}

/* =================== PRODUCT PAGE =================== */
.product-detail {
  max-width: 1400px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 32px;
  font-size: 13px;
  color: var(--text3);
}
.breadcrumb a, .breadcrumb button {
  color: var(--text3);
  transition: var(--transition);
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--font-body);
  font-size: 13px;
}
.breadcrumb a:hover, .breadcrumb button:hover { color: var(--brand); }
.breadcrumb-sep { color: var(--text3); }
.product-detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  margin-bottom: 80px;
}
.product-gallery {}
.gallery-main {
  aspect-ratio: 1;
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--surface);
  margin-bottom: 12px;
  border: 1px solid var(--border);
}
.gallery-main img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: var(--transition);
}
.gallery-thumbs {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.gallery-thumb {
  aspect-ratio: 1;
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
  border: 2px solid transparent;
  cursor: pointer;
  transition: var(--transition);
}
.gallery-thumb.active { border-color: var(--brand); }
.gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
.product-info {}
.product-detail-category {
  font-family: var(--font-heading);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--brand);
  margin-bottom: 12px;
}
.product-detail-name {
  font-family: var(--font-display);
  font-size: clamp(28px, 4vw, 48px);
  letter-spacing: 1px;
  line-height: 1.05;
  margin-bottom: 20px;
}
.product-detail-price {
  font-family: var(--font-heading);
  font-size: 36px;
  font-weight: 700;
  color: var(--brand);
  margin-bottom: 24px;
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.product-detail-price .cur {
  font-size: 20px;
  color: var(--text2);
}
.product-detail-desc {
  color: var(--text2);
  line-height: 1.8;
  font-size: 15px;
  margin-bottom: 28px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--border);
}
.stock-info {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 28px;
}
.stock-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
}
.stock-dot.low { background: #F59E0B; }
.stock-dot.out { background: #EF4444; }
.stock-text { font-size: 13px; color: var(--text2); }
.qty-section {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}
.qty-label {
  font-family: var(--font-heading);
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.5px;
  color: var(--text2);
}
.qty-control {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.qty-btn {
  width: 40px;
  height: 40px;
  background: none;
  border: none;
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-heading);
}
.qty-btn:hover { background: var(--bg3); color: var(--brand); }
.qty-val {
  width: 48px;
  text-align: center;
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 16px;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 8px 0;
}
.detail-actions { display: flex; gap: 12px; flex-wrap: wrap; }
.detail-add-btn {
  flex: 1;
  min-width: 180px;
  background: var(--brand);
  color: white;
  border: none;
  border-radius: var(--radius);
  padding: 14px 28px;
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.detail-add-btn:hover { background: var(--brand-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,52,10,0.4); }
.detail-add-btn.in-cart { background: var(--green); cursor: default; }
.detail-add-btn.in-cart:hover { background: var(--green); transform: none; box-shadow: none; }

/* =================== FEATURES LIST =================== */
.features-list {
  margin-top: 28px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.feature-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  color: var(--text2);
}
.feature-item::before {
  content: '✓';
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: rgba(34,197,94,0.15);
  color: var(--green);
  display: flex;
  align-items: center;
  justify-content: center;
